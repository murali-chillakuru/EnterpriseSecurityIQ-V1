name: EnterpriseSecurityIQ CI

on:
  push:
    branches: [main]
    paths: ['AIAgent/**']
  pull_request:
    branches: [main]
    paths: ['AIAgent/**']

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AIAgent

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: AIAgent/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check app/ tests/

      - name: Run unit tests
        run: pytest tests/ -v --tb=short

